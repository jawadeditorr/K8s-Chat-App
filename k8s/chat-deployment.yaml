apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-chat-app
  labels:
    app: k8s-chat-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: k8s-chat-app
  template:
    metadata:
      labels:
        app: k8s-chat-app
    spec:
      containers:
        - name: k8s-chat-app
          image: k8s-chat-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
